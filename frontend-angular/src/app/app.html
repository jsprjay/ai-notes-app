<div class="container">
  <h1>Notes App</h1>

  <div class="form-row">
    <input
      [(ngModel)]="noteTitle"
      placeholder="Enter note"
      (keyup.enter)="addNote()"
    />

    <button (click)="addNote()">Add Note</button>
  </div>

  <p class="error" *ngIf="error">{{ error }}</p>

  <ul>
    <li *ngFor="let note of notes">
      <span>{{ note.title }}</span>
      <button class="delete-btn" (click)="deleteNote(note.id)">Delete</button>
    </li>
  </ul>
</div>
