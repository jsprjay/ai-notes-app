<div class="container">
  <h1>Notes App</h1>

  <div *ngIf="!isLoggedIn" class="auth-card">
    <h2>{{ isLoginMode ? 'Login' : 'Create Account' }}</h2>

    <input [(ngModel)]="email" placeholder="Email" />
    <input [(ngModel)]="password" placeholder="Password" type="password" />

    <button (click)="handleAuth()">
      {{ isLoginMode ? 'Login' : 'Register' }}
    </button>

    <p class="error" *ngIf="authError">{{ authError }}</p>

    <button class="link-btn" (click)="isLoginMode = !isLoginMode">
      {{ isLoginMode ? 'Need an account? Register' : 'Already have an account? Login' }}
    </button>
  </div>

  <div *ngIf="isLoggedIn">
    
    <div class="form-row">
      <input
        [(ngModel)]="noteTitle"
        placeholder="Enter note"
        (keyup.enter)="addNote()"
      />

      <button (click)="addNote()">Add Note</button>
    </div>

    <p class="error" *ngIf="error">{{ error }}</p>

    <p class="empty-state" *ngIf="!isLoading && filteredNotes.length === 0">
      No notes match your search.
    </p>

    <div class="filter-row">
      <input
        [(ngModel)]="searchTerm"
        placeholder="Search notes..."
      />

      <select [(ngModel)]="sortOption">
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
        <option value="az">A-Z</option>
        <option value="za">Z-A</option>
      </select>
    </div>

    <ul>
      <li *ngFor="let note of filteredNotes">
        <ng-container *ngIf="editingNoteId === note.id; else viewMode">
          <input [(ngModel)]="editedTitle" />

          <button (click)="saveEdit(note.id)">Save</button>
          <button (click)="cancelEditing()">Cancel</button>
        </ng-container>

        <ng-template #viewMode>
          <span>{{ note.title }}</span>

          <div>
            <button (click)="startEditing(note)" [disabled]="isDeletingId === note.id">
              Edit
            </button>

            <button
              class="delete-btn"
              (click)="deleteNote(note.id)"
              [disabled]="isDeletingId === note.id"
            >
              {{ isDeletingId === note.id ? 'Deleting...' : 'Delete' }}
            </button>
          </div>
        </ng-template>
      </li>
    </ul>

    <div class="summary-section">
      <button
        class="summary-btn"
        (click)="getSummary()"
        [disabled]="isSummarizing"
      >
        {{ isSummarizing ? 'Generating summary...' : 'Summarize Notes' }}
      </button>

      <div *ngIf="isSummarizing" class="summary-loading">
        <div class="spinner"></div>
        <span>Ollama is thinking...</span>
      </div>

      <div *ngIf="summary && !isSummarizing" class="summary-card">
        <div class="summary-header">
          <h3>AI Summary</h3>
          <span class="summary-badge">Ollama</span>
        </div>

        <p class="summary-text">{{ summary }}</p>
      </div>
    </div>
    <button (click)="logout()">Logout</button>

  </div>
</div>
